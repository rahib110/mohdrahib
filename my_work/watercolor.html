<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watercolor Painter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
min-height:100vh;display:flex;justify-content:center;align-items:center;
font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;padding:20px;
}
.wrapper{
background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);
border-radius:24px;padding:30px;max-width:1060px;width:100%;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 20px 80px rgba(0,0,0,0.4);
}
h1{
text-align:center;color:#e8d5b7;font-weight:300;font-size:28px;
letter-spacing:4px;margin-bottom:6px;text-transform:uppercase;
}
h1 span{color:#7ab8d4}
.sub{text-align:center;color:rgba(232,213,183,0.4);font-size:13px;letter-spacing:2px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.04);padding-bottom:16px;}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.panel{
position:relative;border-radius:12px;overflow:hidden;
background:rgba(0,0,0,0.3);aspect-ratio:4/3;
border:1px solid rgba(255,255,255,0.06);
}
.panel-label{
position:absolute;top:10px;left:12px;z-index:2;
color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:2px;text-transform:uppercase;
background:rgba(0,0,0,0.4);padding:4px 10px;border-radius:6px;backdrop-filter:blur(4px);
pointer-events:none;
}
.panel canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}
.placeholder{
position:absolute;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
color:rgba(255,255,255,0.1);z-index:1;pointer-events:none;transition:opacity .4s;
}
.placeholder svg{width:60px;height:60px;margin-bottom:10px;opacity:0.25}
.placeholder span{font-size:13px;letter-spacing:1px}
.placeholder.hidden{opacity:0}
.overlay{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;
z-index:3;border-radius:12px;
}
.overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#7ab8d4;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center;}
.controls button{
background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
color:#c8b89a;padding:9px 20px;border-radius:8px;cursor:pointer;
font-size:13px;letter-spacing:1px;transition:all .25s;font-family:inherit;
}
.controls button:hover{background:rgba(122,184,212,0.15);color:#7ab8d4;border-color:rgba(122,184,212,0.3);}
.controls button:disabled{opacity:0.25;cursor:default;pointer-events:none;}
.controls button.primary{background:rgba(122,184,212,0.15);color:#7ab8d4;border-color:rgba(122,184,212,0.2);}
.controls button.primary:hover{background:rgba(122,184,212,0.25);}
.sliders{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.04);}
.slider-group{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:90px;}
.slider-group label{color:rgba(232,213,183,0.4);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.slider-group input[type=range]{
-webkit-appearance:none;appearance:none;width:100%;height:3px;
background:rgba(255,255,255,0.1);border-radius:2px;outline:none;
}
.slider-group input[type=range]::-webkit-slider-thumb{
-webkit-appearance:none;appearance:none;width:14px;height:14px;
border-radius:50%;background:#7ab8d4;cursor:pointer;border:none;
}
.slider-group .val{color:rgba(232,213,183,0.5);font-size:12px;min-width:20px;text-align:center;}
#fileInput{display:none}
.error-msg{color:#e74c3c;font-size:12px;text-align:center;margin-top:8px;display:none;}
@media(max-width:700px){
.wrapper{padding:16px;border-radius:16px}
.panels{grid-template-columns:1fr;gap:12px}
.panel{aspect-ratio:4/3}
h1{font-size:20px}
.controls{gap:8px}
.controls button{font-size:11px;padding:7px 14px}
.sliders{gap:12px}
}
</style>
</head>
<body>
<div class="wrapper">
<h1>water<span>color</span></h1>
<div class="sub">turn your photos into paintings</div>

<div class="panels">
<div class="panel">
<div class="panel-label">original</div>
<div class="placeholder" id="placeholderOrig">
<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="10" width="44" height="40" rx="3"/><circle cx="22" cy="24" r="5"/><path d="M10 48l14-18 10 12 8-6 18 12"/></svg>
<span>choose a photo</span>
</div>
<canvas id="origCanvas"></canvas>
</div>
<div class="panel">
<div class="panel-label">watercolor</div>
<div class="placeholder" id="placeholderResult">
<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 28c0-8 6-14 14-14s14 6 14 14c0 8-6 20-14 20S12 36 12 28z" opacity=".5"/><path d="M26 18c6 2 10 8 8 14" opacity=".4"/><circle cx="20" cy="26" r="2" opacity=".3"/><circle cx="34" cy="30" r="3" opacity=".2"/></svg>
<span>paint will appear here</span>
</div>
<div class="overlay" id="processingOverlay"><div class="spinner"></div></div>
<canvas id="resultCanvas"></canvas>
</div>
</div>

<div class="controls">
<button id="chooseBtn">📷 Choose Photo</button>
<button id="convertBtn" class="primary" disabled>🎨 Convert</button>
<button id="downloadBtn" disabled>💾 Download</button>
<button id="resetBtn">↻ Reset</button>
<input type="file" id="fileInput" accept="image/*">
</div>

<div class="sliders">
<div class="slider-group">
<label>wash</label>
<input type="range" id="washSlider" min="1" max="8" value="4" step="1">
<span class="val" id="washVal">4</span>
</div>
<div class="slider-group">
<label>detail</label>
<input type="range" id="detailSlider" min="1" max="10" value="5" step="1">
<span class="val" id="detailVal">5</span>
</div>
<div class="slider-group">
<label>posterize</label>
<input type="range" id="posterSlider" min="4" max="14" value="8" step="1">
<span class="val" id="posterVal">8</span>
</div>
</div>

<div class="error-msg" id="errorMsg"></div>
</div>

<script>
(function(){
const OC=document.getElementById('origCanvas');
const RC=document.getElementById('resultCanvas');
const OX=OC.getContext('2d');
const RX=RC.getContext('2d');
const FI=document.getElementById('fileInput');
const CB=document.getElementById('chooseBtn');
const CV=document.getElementById('convertBtn');
const DB=document.getElementById('downloadBtn');
const RB=document.getElementById('resetBtn');
const WS=document.getElementById('washSlider');
const DS=document.getElementById('detailSlider');
const PS=document.getElementById('posterSlider');
const WV=document.getElementById('washVal');
const DV=document.getElementById('detailVal');
const PV=document.getElementById('posterVal');
const PO=document.getElementById('placeholderOrig');
const PR=document.getElementById('placeholderResult');
const OV=document.getElementById('processingOverlay');
const EM=document.getElementById('errorMsg');

let IMG=null, RD=null, BUSY=false;

WS.oninput=()=>WV.textContent=WS.value;
DS.oninput=()=>DV.textContent=DS.value;
PS.oninput=()=>PV.textContent=PS.value;
CB.onclick=()=>FI.click();

FI.onchange=function(){
const f=FI.files[0];if(!f)return;
EM.style.display='none';
const r=new FileReader();
r.onload=function(e){
const img=new Image();
img.onload=function(){
IMG=img;fit(img);
OX.drawImage(img,0,0,OC.width,OC.height);
PO.classList.add('hidden');CV.disabled=false;
RX.clearRect(0,0,RC.width,RC.height);
RD=null;DB.disabled=true;PR.classList.remove('hidden');
};
img.onerror=()=>{EM.textContent='Could not load image.';EM.style.display='block';};
img.src=e.target.result;
};
r.readAsDataURL(f);FI.value='';
};

function fit(img){
const p=OC.parentElement;
const mw=p.clientWidth-4,mh=p.clientHeight-4;
const s=Math.min(mw/img.width,mh/img.height,1);
OC.width=Math.round(img.width*s);OC.height=Math.round(img.height*s);
}

CV.onclick=run;

async function run(){
if(!IMG||BUSY)return;
BUSY=true;CV.disabled=true;OV.classList.add('show');EM.style.display='none';
await new Promise(r=>setTimeout(r,30));
try{
const url=paint(IMG);
RD=url;
const i=new Image();
await new Promise((ok,fail)=>{
i.onload=()=>{RC.width=i.width;RC.height=i.height;RX.drawImage(i,0,0);PR.classList.add('hidden');DB.disabled=false;ok();};
i.onerror=fail;
i.src=url;
});
}catch(e){EM.textContent='Error: '+e.message;EM.style.display='block';}
BUSY=false;OV.classList.remove('show');CV.disabled=false;
}

// -------- MAIN WATERCOLOR PIPELINE --------
function paint(img){
const MAX=900;
const sc=Math.min(MAX/img.width,MAX/img.height,1);
const w=Math.round(img.width*sc),h=Math.round(img.height*sc);

const tc=document.createElement('canvas');
tc.width=w;tc.height=h;
const tx=tc.getContext('2d');
tx.drawImage(img,0,0,w,h);
let id=tx.getImageData(0,0,w,h);
const d=id.data;

const W=parseInt(WS.value), D=parseInt(DS.value)/10, P=parseInt(PS.value);

// 1. GAUSSIAN BLUR (wash)
blur(d,w,h,W);

// 2. SOFT POSTERIZE
posterize(d,w,h,P);

// 3. SATURATION BOOST
boostSat(d,w,h,0.12);

// 4. EDGE DARKEN WITH POOLING
const edges=sobel(d,w,h);
const dilated=dilate(edges,w,h,2+Math.round(D*2));
applyEdges(d,w,h,dilated,D);

// 5. BRUSH STROKES (shifted layers)
strokes(d,w,h);

// 6. PAPER TEXTURE
paper(d,w,h);

// 7. FINAL SATURATION + WARM
boostSat(d,w,h,0.08);
warm(d,w,h,0.04);

tx.putImageData(id,0,0);
return tc.toDataURL('image/png');
}

// -------- BLUR --------
function blur(d,w,h,level){
const passes=level+1;
const rad=2+Math.floor(level/2);
for(let p=0;p<passes;p++){
const r=Math.max(1,Math.round(rad*(1-p/passes*0.5)));
hBlur(d,w,h,r);
vBlur(d,w,h,r);
}
}
function hBlur(d,w,h,r){
const len=2*r+1;
for(let y=0;y<h;y++){
for(let c=0;c<3;c++){
let s=0;
for(let i=-r;i<=r;i++)s+=d[(y*w+Math.min(Math.max(i,0),w-1))*4+c];
d[y*w*4+c]=s/len;
for(let x=1;x<w;x++){
s+=d[(y*w+Math.min(x+r,w-1))*4+c]-d[(y*w+Math.max(x-r-1,0))*4+c];
d[(y*w+x)*4+c]=s/len;
}}}}
function vBlur(d,w,h,r){
const len=2*r+1;
for(let x=0;x<w;x++){
for(let c=0;c<3;c++){
let s=0;
for(let i=-r;i<=r;i++)s+=d[(Math.min(Math.max(i,0),h-1)*w+x)*4+c];
d[x*4+c]=s/len;
for(let y=1;y<h;y++){
s+=d[(Math.min(y+r,h-1)*w+x)*4+c]-d[(Math.max(y-r-1,0)*w+x)*4+c];
d[(y*w+x)*4+c]=s/len;
}}}}

// -------- SOFT POSTERIZE --------
function posterize(d,w,h,levels){
const step=255/(levels-1);
for(let i=0;i<d.length;i+=4){
for(let c=0;c<3;c++){
const target=Math.round(Math.round(d[i+c]/step)*step);
const diff=Math.abs(d[i+c]-target);
const blend=Math.min(1,diff/30);
d[i+c]=Math.round(d[i+c]*(1-blend*0.6)+target*blend*0.6);
}}
}

// -------- SATURATION BOOST --------
function boostSat(d,w,h,amt){
for(let i=0;i<d.length;i+=4){
const r=d[i],g=d[i+1],b=d[i+2];
const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
const l=(mx+mn)/2;
if(mx===mn)continue;
const sat=mx===0?0:(mx-mn)/mx;
const ns=Math.min(1,sat+amt);
const f=ns/(sat||1);
const avg=(r+g+b)/3;
d[i]=Math.round(avg+(r-avg)*f);
d[i+1]=Math.round(avg+(g-avg)*f);
d[i+2]=Math.round(avg+(b-avg)*f);
}}

// -------- SOBEL EDGE DETECTION --------
function sobel(d,w,h){
const g=new Float32Array(w*h);
for(let i=0;i<w*h;i++){
const idx=i*4;
g[i]=0.299*d[idx]+0.587*d[idx+1]+0.114*d[idx+2];
}
const e=new Float32Array(w*h);
const sx=[-1,0,1,-2,0,2,-1,0,1],sy=[-1,-2,-1,0,0,0,1,2,1];
for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
let gx=0,gy=0;
for(let ky=-1;ky<=1;ky++)for(let kx=-1;kx<=1;kx++){
const k=(ky+1)*3+(kx+1);
gx+=g[(y+ky)*w+(x+kx)]*sx[k];
gy+=g[(y+ky)*w+(x+kx)]*sy[k];
}
e[y*w+x]=Math.sqrt(gx*gx+gy*gy);
}
return e;
}

// -------- DILATE EDGES (widen for pooling) --------
function dilate(edges,w,h,rad){
const out=new Float32Array(edges.length);
for(let y=0;y<h;y++)for(let x=0;x<w;x++){
let mx=0;
for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++){
const px=Math.min(w-1,Math.max(0,x+dx));
const py=Math.min(h-1,Math.max(0,y+dy));
mx=Math.max(mx,edges[py*w+px]);
}
out[y*w+x]=mx;
}
return out;
}

// -------- APPLY EDGE DARKENING --------
function applyEdges(d,w,h,edges,strength){
let maxE=0;
for(let i=0;i<edges.length;i++)if(edges[i]>maxE)maxE=edges[i];
if(maxE<1)maxE=1;
const edgeScale=strength*0.5;
for(let i=0;i<edges.length;i++){
const ei=Math.min(edges[i]/maxE,1);
const dark=1-Math.pow(ei,0.9)*edgeScale;
const idx=i*4;
d[idx]=Math.round(d[idx]*dark);
d[idx+1]=Math.round(d[idx+1]*dark);
d[idx+2]=Math.round(d[idx+2]*dark);
}
}

// -------- BRUSH STROKES --------
function strokes(d,w,h){
const copy=new Uint8ClampedArray(d);
const offsets=[[2,1],[-1,2],[1,-2],[-2,-1],[3,-2],[-3,2],[0,3],[2,-3]];
for(const[ox,oy]of offsets){
const op=0.12;
for(let y=Math.max(0,-oy);y<Math.min(h,h-oy);y++){
for(let x=Math.max(0,-ox);x<Math.min(w,w-ox);x++){
const si=((y+oy)*w+(x+ox))*4;
const di=(y*w+x)*4;
for(let c=0;c<3;c++){
d[di+c]=Math.round(d[di+c]*(1-op)+copy[si+c]*op);
}}}}}

// -------- PAPER TEXTURE --------
function paper(d,w,h){
const n=new Float32Array(w*h);
for(let y=0;y<h;y++)for(let x=0;x<w;x++){
const v=Math.sin(x*12.9898+y*78.233)*43758.5453;
const v2=Math.sin(x*9.123+y*65.432)*12345.6789;
const f1=v-Math.floor(v),f2=v2-Math.floor(v2);
const hv=Math.sin(x*0.3+y*0.5)*0.5+0.5;
n[y*w+x]=f1*0.4+f2*0.3+hv*0.1;
}
for(let i=0;i<d.length;i+=4){
const t=n[i/4];
const overlay=(t<0.5)?(2*t):(1-2*(1-t)*(1-t));
const f=0.08;
d[i]=Math.round(d[i]*(1-f)+d[i]*overlay*f);
d[i+1]=Math.round(d[i+1]*(1-f)+d[i+1]*overlay*f);
d[i+2]=Math.round(d[i+2]*(1-f)+d[i+2]*overlay*f);
}
}

// -------- WARM TINT --------
function warm(d,w,h,amt){
for(let i=0;i<d.length;i+=4){
d[i]=Math.min(255,Math.round(d[i]+(255-d[i])*amt*0.3));
d[i+2]=Math.max(0,Math.round(d[i+2]-d[i+2]*amt*0.3));
}}

// -------- RESET --------
RB.onclick=function(){
if(BUSY)return;
WS.value=4;WV.textContent='4';DS.value=5;DV.textContent='5';PS.value=8;PV.textContent='8';
if(IMG){
CV.disabled=false;OX.drawImage(IMG,0,0,OC.width,OC.height);
RX.clearRect(0,0,RC.width,RC.height);RD=null;DB.disabled=true;
PR.classList.remove('hidden');
}
EM.style.display='none';
};

DB.onclick=function(){
if(!RD)return;
const a=document.createElement('a');
a.href=RD;a.download='watercolor-'+Date.now()+'.png';
document.body.appendChild(a);a.click();document.body.removeChild(a);
};

window.onresize=function(){
if(IMG){fit(IMG);OX.drawImage(IMG,0,0,OC.width,OC.height);}
};

})();
</script>
</body>
</html>
